unbind C-b
set-option -g prefix C-n
bind-key C-n send-prefix

bind r refresh-client
bind R source-file ~/.tmux.conf

set -g mouse on
set-option -g allow-rename off

# Visual tweaks
set -g visual-activity off
set -g visual-silence off
setw -g monitor-activity off

set-option -sg escape-time 10

# onedark-inspired colors
set -g status-style fg="#abb2bf"
set -g status-style bg=default
# Statusline positioning
set -g focus-events on
set -g status-position bottom
set -g status-justify absolute-centre
set -g status-left-length 99
set -g status-right-length 99
# These commands tell Tmux to read the output generated by tpipeline
set -g status-left-length 99
set -g status-right-length 99
set -g status-left '#(cat #{socket_path}-#{session_id}-vimbridge)'
set -g status-right '#(cat #{socket_path}-#{session_id}-vimbridge-R)'


setw -g window-status-format " #[fg=#5c6370]#I #[fg=#abb2bf]#W "
setw -g window-status-current-format " #[bg=#61afef,fg=#282c34] #I #[bg=#61afef,fg=#282c34,bold]#W "

setw -g mode-keys vi

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key f display-popup -E "tmux list-windows -a | fzf | cut -d: -f1-2 | xargs -I {} tmux switch-client -t {}"
# jump to last bell
bind-key b run-shell 'target=$(cat /tmp/tmux-last-bell 2>/dev/null) && tmux switch-client -t "${target%%:*}" && tmux select-window -t "${target%.*}" && tmux select-pane -t "$target"'
bind-key a command-prompt -p "antigravity:" "split-window -h -l 27% 'agy %1'"
bind-key A command-prompt -p "antigravity resume:" "split-window -h -l 27% 'agy %1 --continue'"

# Fix for truecolor in neovim
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -g default-terminal "tmux-256color"

bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"

# send notifications to Gnome when a bell event occurs in any pane, with details about the
# session, window, pane, and command that triggered it. The notifications can be used to quickly jump to the
# relevant pane using the prefix+b keybinding. Additionally, the monitor-bell option is enabled to ensure that
# Tmux detects bell events, and the bell-action is set to any to allow for custom handling of bell events.

set-hook -g alert-bell 'run-shell -b "/home/som/Projects/config/tmux/tmux-bell-handler.sh \"#{session_name}\" \"#{window_index}\" \"#{pane_index}\" \"#{pane_current_command}\""'
set-window-option -g monitor-bell on
set-option -g bell-action any
